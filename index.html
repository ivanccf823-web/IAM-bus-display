<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>105 專攻 Debug Mode</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; margin: 0; padding: 10px; }
        .header { border-bottom: 2px solid #28a745; padding-bottom: 10px; margin-bottom: 10px; }
        #debug-console { 
            width: 100%; height: 500px; background: #0a0a0a; color: #0f0; 
            border: 1px solid #333; padding: 10px; overflow-y: scroll; 
            font-size: 12px; box-sizing: border-box; white-space: pre-wrap; word-break: break-all;
        }
        .btn-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-green { background: #28a745; color: white; }
        .btn-blue { background: #007bff; color: white; }
        .preview { opacity: 0.3; margin-top: 20px; border-top: 1px solid #222; padding-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <strong>🛠️ 105 小巴數據偵察器 V15.0</strong>
</div>

<div class="btn-group">
    <button class="btn btn-green" onclick="startScanning105()">掃描 105 全線車站 (往土瓜灣)</button>
    <button class="btn btn-blue" onclick="testCurrentConfig()">執行現有路線刷新</button>
</div>

<div id="debug-console">--- 點擊上方按鈕開始偵錯 ---</div>

<div class="preview">
    <small>UI 預覽區 (Debug 期間僅供參考)</small>
    <div id="display"></div>
</div>

<script>
    const GMB_105_ID = "2006606"; // 105 路線 ID
    const PROXY = "https://api.allorigins.win/get?url=";

    function log(msg, type = 'INFO') {
        const consoleEl = document.getElementById('debug-console');
        const time = new Date().toLocaleTimeString('zh-HK',{hour12:false});
        const colors = { INFO: '#0f0', WARN: '#ff0', ERROR: '#f00', DATA: '#0af' };
        consoleEl.innerHTML += `\n<span style="color:${colors[type]}">[${time}] [${type}] ${msg}</span>`;
        consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    // 🚀 功能一：掃描 105 全線車站
    async function startScanning105() {
        log("開始掃描 105 路線 (往土瓜灣方向)...");
        try {
            // 105 路線在 API 中通常分為方向 1 和 2，我們試下方向 1 (往土瓜灣)
            const target = `https://data.etagmb.gov.hk/route-stop/${GMB_105_ID}/1`;
            const res = await fetch(PROXY + encodeURIComponent(target));
            const wrapper = await res.json();
            const json = JSON.parse(wrapper.contents);

            if (!json.data || json.data.length === 0) {
                log("無法獲取車站列表，可能是方向編號不對，嘗試方向 2...", 'WARN');
                return;
            }

            log(`成功獲取 ${json.data.length} 個站點，正在解析名稱...`, 'DATA');
            
            for (let stop of json.data) {
                // 再去抓取每個站點的詳細名稱
                const stopTarget = `https://data.etagmb.gov.hk/stop/${stop.stop_id}`;
                const sRes = await fetch(PROXY + encodeURIComponent(stopTarget));
                const sWrapper = await sRes.json();
                const sJson = JSON.parse(sWrapper.contents);
                const stopName = sJson.data ? sJson.data.name_tc : "未知車站";
                
                log(`[站點序號 ${stop.stop_seq}] ID: ${stop.stop_id} | 名稱: ${stopName}`, 'INFO');
            }
            log("--- 掃描完成，請尋找你所在的車站 ID ---", 'DATA');

        } catch (e) {
            log(`掃描失敗: ${e.message}`, 'ERROR');
        }
    }

    // 🚀 功能二：執行現有路線刷新 (九巴 + 目前 105 設定)
    async function testCurrentConfig() {
        log("執行標準刷新測試...");
        // ... (這裡保留之前的 KMB 抓取邏輯，方便比對)
        const kmb_routes = [
            { r: '98D', s: '6AE5EC17DAE4E646' },
            { r: '290A', s: '3366C1DC458401B3' }
        ];

        for (let route of kmb_routes) {
            try {
                const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${route.s}/${route.r}/1`);
                const json = await res.json();
                log(`九巴 ${route.r} 狀態: ${json.data ? '正常' : '無數據'}`);
            } catch (e) { log(`${route.r} 失敗`, 'ERROR'); }
        }
        
        // 測試 105 即時 ETA
        try {
            const target = `https://data.etagmb.gov.hk/eta/route-stop/${GMB_105_ID}/2001584`;
            const res = await fetch(PROXY + encodeURIComponent(target));
            const wrapper = await res.json();
            log(`105 (ID:2001584) ETA 原始回傳: ${wrapper.contents}`, 'DATA');
        } catch (e) { log(`105 ETA 請求失敗`, 'ERROR'); }
    }
</script>
</body>
</html>
