<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>105 深度偵錯 V18.0</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 15px; }
        #console { 
            width: 100%; height: 550px; background: #0a0a0a; color: #0f0; 
            border: 1px solid #444; padding: 10px; overflow-y: scroll; 
            font-size: 12px; white-space: pre-wrap;
        }
        .btn { background: #d9534f; color: white; border: none; padding: 15px; border-radius: 5px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .data-box { color: #0af; margin: 10px 0; border: 1px dashed #444; padding: 5px; }
        .timestamp { color: #ffcc00; font-weight: bold; }
    </style>
</head>
<body>

<div style="border-bottom: 1px solid #444; margin-bottom: 10px; padding-bottom: 5px;">
    <strong>🎯 105 數據新鮮度偵查 (強制不緩存版)</strong>
</div>

<button class="btn" onclick="forceRefresh105()">強制請求最新 105 數據</button>

<div id="console">--- 等待指令 ---</div>

<script>
    const RID = "2006606";
    const SID = "20014655";
    const PROXY = "https://api.allorigins.win/get?url=";
    let lastData = "";

    function log(msg, type = 'INFO') {
        const el = document.getElementById('console');
        const time = new Date().toLocaleTimeString('zh-HK',{hour12:false});
        const color = type === 'DATA' ? '#0af' : (type === 'ERROR' ? '#f00' : '#0f0');
        el.innerHTML += `\n<span style="color:${color}">[${time}] ${msg}</span>`;
        el.scrollTop = el.scrollHeight;
    }

    async function forceRefresh105() {
        // 🚀 加入 Cache Buster: 喺網址後面加個隨機數，確保唔會攞到舊 Cache
        const ts = Date.now();
        const target = `https://data.etagmb.gov.hk/eta/route-stop/${RID}/${SID}?t=${ts}`;
        const proxyUrl = `${PROXY}${encodeURIComponent(target)}`;
        
        log(`正在發送強制請求...`);
        log(`目標 URL: ${target}`, 'DATA');

        try {
            const res = await fetch(proxyUrl);
            const wrapper = await res.json();
            const rawJson = wrapper.contents;
            const json = JSON.parse(rawJson);

            // 檢查數據時間
            const apiTime = json.generated_timestamp || "無時間戳";
            log(`伺服器生成時間: <span class="timestamp">${apiTime}</span>`);

            if (rawJson === lastData) {
                log(`⚠️ 數據內容同上一次完全一樣！可能 API 未更新。`, 'ERROR');
            } else {
                log(`✅ 數據有變動！`, 'INFO');
                lastData = rawJson;
            }

            // 顯示最關鍵嘅 ETA 段落
            if (json.data && json.data.length > 0 && json.data[0].eta_res) {
                const etas = json.data[0].eta_res;
                log(`目前 ETA 數據：`, 'DATA');
                etas.forEach((e, i) => {
                    log(`  ${i+1}. 時間: ${e.timestamp} | 狀態: ${e.eta_status === 1 ? '實時' : '預計'}`);
                });
            } else {
                log(`API 內容: ${rawJson.substring(0, 200)}...`, 'DATA');
            }

        } catch (e) {
            log(`請求失敗: ${e.message}`, 'ERROR');
        }
        log(`-----------------------------------`);
    }

    // 自動每 30 秒跑一次，方便你觀察
    setInterval(forceRefresh105, 30000);
    forceRefresh105();
</script>
</body>
</html>
