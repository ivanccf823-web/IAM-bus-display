<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>105 ETA 狙擊器 V15.2</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; padding: 15px; }
        .header { border-bottom: 2px solid #0af; margin-bottom: 15px; }
        #console { 
            width: 100%; height: 500px; background: #0a0a0a; color: #0f0; 
            border: 1px solid #333; padding: 10px; overflow-y: scroll; 
            font-size: 12px; white-space: pre-wrap;
        }
        .btn { background: #007bff; color: white; border: none; padding: 15px; border-radius: 5px; width: 100%; font-weight: bold; cursor: pointer; }
        .success-hit { background: #28a745; color: #fff; padding: 2px 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <strong>🎯 105 小巴 ETA 狙擊器 (掃描 14 個站點)</strong>
</div>

<button class="btn" onclick="snipeETAs()">開始集體測試 14 個站點</button>

<div id="console">--- 準備就緒，點擊上方按鈕開始 ---</div>

<script>
    // 從你上次 Log 提取嘅 14 個 ID
    const STOP_IDS = [
        "20014652", "20014653", "20014654", "20014655", "20014656", 
        "20014657", "20014204", "20014205", "20014658", "20001175", 
        "20001150", "20001151", "20010616", "20014659"
    ];
    const RID = "2006606";
    const PROXY = "https://api.allorigins.win/get?url=";

    function log(msg, isSuccess = false) {
        const el = document.getElementById('console');
        const time = new Date().toLocaleTimeString('zh-HK',{hour12:false});
        const content = isSuccess ? `<span class="success-hit">${msg}</span>` : msg;
        el.innerHTML += `\n[${time}] ${content}`;
        el.scrollTop = el.scrollHeight;
    }

    async function snipeETAs() {
        log("開始狙擊測試...");
        for (let i = 0; i < STOP_IDS.length; i++) {
            const sid = STOP_IDS[i];
            log(`正在測試 第 ${i+1} 個站 (ID: ${sid})...`);
            
            try {
                const target = `https://data.etagmb.gov.hk/eta/route-stop/${RID}/${sid}`;
                const res = await fetch(PROXY + encodeURIComponent(target));
                const wrapper = await res.json();
                const json = JSON.parse(wrapper.contents);

                if (json.data && (json.data.eta_res || json.data.length > 0)) {
                    log(`🎯 命中！站點 ${sid} 有數據：${wrapper.contents.substring(0, 100)}...`, true);
                } else if (json.code === 500) {
                    log(`站點 ${sid} 回傳: 500 (無數據)`);
                } else {
                    log(`站點 ${sid} 回傳未知格式`);
                }
            } catch (e) {
                log(`站點 ${sid} 通訊失敗`);
            }
            // 稍作停頓防止被 Block
            await new Promise(r => setTimeout(r, 800));
        }
        log("--- 狙擊完成 ---");
    }
</script>
</body>
</html>
