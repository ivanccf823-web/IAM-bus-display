<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我的巴士站牌</title>
    <style>
        :root { --kmb-color: #ffcc00; --gmb-color: #00ff00; --ctb-color: #fbca06; --bg-color: #000; }
        body { background: var(--bg-color); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 10px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 5px 15px; opacity: 0.5; font-size: 12px; }
        
        .card { 
            background: #1a1a1a; 
            margin: 12px 0; 
            border-radius: 12px; 
            display: flex; 
            align-items: center;
            padding: 15px;
            border-left: 6px solid var(--kmb-color);
        }
        .gmb-card { border-left-color: var(--gmb-color); }
        .ctb-card { border-left-color: #0055ad; }

        /* 左邊：路線資訊 */
        .info-section {
            flex: 1; /* 佔用剩餘空間 */
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .route-num { font-size: 45px; font-weight: 900; color: var(--kmb-color); line-height: 1; }
        .gmb-card .route-num { color: var(--gmb-color); }
        .ctb-card .route-num { color: #fbca06; }
        .dest { font-size: 16px; color: #888; margin-top: 6px; font-weight: bold; }

        /* 右邊：三個時間方塊 */
        .eta-section {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .eta-box {
            width: 65px;
            height: 65px;
            background: #262626;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        /* 第一班車加強視覺 */
        .eta-box:first-child {
            background: #333;
            border: 1px solid #444;
            width: 75px;
            height: 75px;
        }
        .eta-val { font-size: 32px; font-weight: 900; color: #fff; }
        .eta-box:first-child .eta-val { font-size: 40px; }
        
        .arriving { color: #ffcc00; font-size: 14px; font-weight: bold; animation: blink 1s infinite; text-align: center; line-height: 1.2; }
        
        @keyframes blink { 0% {opacity:1} 50% {opacity:0.3} 100% {opacity:1} }
        #debug-log { height: 60px; background: #111; color: #00ff00; font-size: 10px; font-family: monospace; padding: 8px; border-radius: 8px; overflow-y: auto; margin-top: 10px; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="header">
    <span>🚍 REAL-TIME BUS V6.0</span>
    <span id="update-time">--:--:--</span>
</div>

<div id="display">載入中...</div>
<div id="debug-log"></div>

<script>
    const SYNC_CONFIGS = [
        { type: 'KMB', route: '98D', stop_id: '6AE5EC17DAE4E646', dir: 'O' },
        { type: 'KMB', route: '290A', stop_id: '3366C1DC458401B3', dir: 'I' },
        { type: 'CTB', route: '694', stop_id: '001684', dir: 'I' },
        { type: 'KMB', route: '290X', stop_id: '3366C1DC458401B3', dir: 'I' },
        { type: 'GMB', route: '105', route_id: '2006606', stop_id: '2001584' },
        { type: 'CTB', route: '798', stop_id: '001760', dir: 'O' }
    ];

    function addLog(msg) {
        const logBox = document.getElementById('debug-log');
        logBox.innerHTML += `<div>[${new Date().toLocaleTimeString('zh-HK',{hour12:false})}] ${msg}</div>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    async function updateUI() {
        let html = '';
        const now = new Date();
        document.getElementById('update-time').innerText = now.toLocaleTimeString('zh-HK',{hour12:false});

        for (const item of SYNC_CONFIGS) {
            try {
                let etas = [];
                if (item.type === 'KMB') {
                    const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${item.stop_id}/${item.route}/1`);
                    const json = await res.json();
                    etas = (json.data || []).filter(d => d.dir === item.dir).slice(0, 3).map(d => ({ dest: d.dest_tc, time: d.eta }));
                } else if (item.type === 'CTB') {
                    const res = await fetch(`https://rt.data.gov.hk/v1/transport/citybus/eta/CTB/${item.stop_id}/${item.route}`);
                    const json = await res.json();
                    etas = (json.data || []).filter(d => d.dir === item.dir).slice(0, 3).map(d => ({ dest: d.dest_tc, time: d.eta }));
                } else if (item.type === 'GMB') {
                    const res = await fetch(`https://data.etagmb.gov.hk/eta/route-stop/${item.route_id}/${item.stop_id}`);
                    const json = await res.json();
                    const rawEtas = json.data.eta_res || json.data || [];
                    etas = rawEtas.slice(0, 3).map(d => ({ dest: '高山道', time: d.timestamp }));
                }

                const validEtas = etas.filter(eta => (new Date(eta.time) - now) / 1000 > -120);

                html += `<div class="card ${item.type.toLowerCase()}-card">
                            <div class="info-section">
                                <div class="route-num">${item.route}</div>
                                <div class="dest">往 ${validEtas[0]?.dest || '---'}</div>
                            </div>
                            <div class="eta-section">`;

                if (validEtas.length === 0) {
                    html += `<div style="color:#444; font-weight:bold">服務結束</div>`;
                } else {
                    for (let i = 0; i < 3; i++) {
                        if (validEtas[i]) {
                            const diff = Math.floor((new Date(validEtas[i].time) - now) / 60000);
                            let display = diff <= 0 ? `<span class="arriving">即將<br>抵達</span>` : `<span class="eta-val">${diff}</span>`;
                            html += `<div class="eta-box">${display}</div>`;
                        } else {
                            html += `<div class="eta-box" style="opacity:0.2"><span class="eta-val">--</span></div>`;
                        }
                    }
                }
                
                html += `</div></div>`;
            } catch (e) { 
                addLog(`${item.route} 錯誤: ${e.message}`);
            }
        }
        document.getElementById('display').innerHTML = html;
        addLog("刷新完成");
    }

    updateUI();
    setInterval(updateUI, 30000);
</script>
</body>
</html>
