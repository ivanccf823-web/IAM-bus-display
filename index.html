<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Debug 模式 - 巴士站牌</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; margin: 0; padding: 10px; }
        .header { border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 10px; }
        
        /* 加大 Log 區域 */
        #debug-console { 
            width: 100%; 
            height: 400px; 
            background: #111; 
            color: #0f0; 
            border: 2px solid #333; 
            padding: 10px; 
            overflow-y: scroll; 
            font-size: 12px;
            box-sizing: border-box;
            margin-bottom: 20px;
            white-space: pre-wrap; /* 保留換行 */
            word-break: break-all;
        }

        .btn { background: #28a745; color: white; border: none; padding: 10px; border-radius: 5px; width: 100%; margin-bottom: 10px; }
        
        /* 縮小 UI 預覽 */
        .preview-label { color: #888; font-size: 12px; margin-bottom: 5px; }
        #display { opacity: 0.5; pointer-events: none; }
        .card { background: #1a1a1a; margin: 5px 0; padding: 10px; border-radius: 8px; display: flex; justify-content: space-between; border-left: 5px solid #ffcc00; }
        .eta-section { display: flex; gap: 5px; }
        .eta-box { width: 40px; height: 40px; background: #222; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="header">
    <strong>🚍 完整 Debug Log 生成中...</strong>
    <div id="update-time" style="font-size: 12px; color: #888;"></div>
</div>

<button class="btn" onclick="updateUI()">手動刷新數據</button>

<div id="debug-console">--- 系統啟動，準備抓取數據 ---</div>

<div class="preview-label">UI 佈局預覽 (暫時性)：</div>
<div id="display"></div>

<script>
    const SYNC_CONFIGS = [
        { type: 'KMB', route: '98D', stop_id: '6AE5EC17DAE4E646', dir: 'O' },
        { type: 'KMB', route: '290A', stop_id: '3366C1DC458401B3', dir: 'I' },
        { type: 'KMB', route: '290X', stop_id: '3366C1DC458401B3', dir: 'I' },
        { type: 'GMB', route: '105', route_id: '2006606', stop_id: '2001584' }
    ];

    function log(msg, type = 'INFO') {
        const consoleEl = document.getElementById('debug-console');
        const time = new Date().toLocaleTimeString('zh-HK',{hour12:false});
        const color = type === 'ERROR' ? '#f00' : (type === 'DATA' ? '#0af' : '#0f0');
        consoleEl.innerHTML += `\n<span style="color:${color}">[${time}] [${type}] ${msg}</span>`;
        consoleEl.scrollTop = consoleEl.scrollHeight;
        console.log(`[${type}] ${msg}`);
    }

    async function updateUI() {
        const display = document.getElementById('display');
        document.getElementById('update-time').innerText = "最後更新: " + new Date().toLocaleTimeString();
        let html = '';

        log("開始輪詢各路線...");

        for (const item of SYNC_CONFIGS) {
            try {
                let etas = [];
                log(`正在處理 ${item.type} ${item.route}...`);

                if (item.type === 'KMB') {
                    const url = `https://data.etabus.gov.hk/v1/transport/kmb/eta/${item.stop_id}/${item.route}/1`;
                    log(`Fetch URL: ${url}`);
                    const res = await fetch(url);
                    log(`HTTP 狀態: ${res.status}`);
                    const json = await res.json();
                    etas = (json.data || []).filter(d => d.dir === item.dir).slice(0, 3).map(d => ({ dest: d.dest_tc, time: d.eta }));
                    log(`${item.route} 成功獲得 ${etas.length} 班數據`);
                } else if (item.type === 'GMB') {
                    const targetUrl = `https://data.etagmb.gov.hk/eta/route-stop/${item.route_id}/${item.stop_id}`;
                    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
                    
                    log(`GMB 目標: ${targetUrl}`, 'INFO');
                    log(`使用代理: ${proxyUrl}`, 'INFO');

                    const res = await fetch(proxyUrl);
                    log(`代理 HTTP 狀態: ${res.status}`);
                    
                    const wrapper = await res.json();
                    // log(`代理回傳內容截段: ${JSON.stringify(wrapper).substring(0, 100)}...`, 'DATA');

                    if (!wrapper.contents) {
                        log(`${item.route} 錯誤: 代理伺服器沒有回傳 contents`, 'ERROR');
                    } else {
                        const json = JSON.parse(wrapper.contents);
                        log(`${item.route} 原始 JSON 數據: ${wrapper.contents.substring(0, 200)}...`, 'DATA');
                        
                        let rawList = [];
                        if (json.data && Array.isArray(json.data) && json.data.length > 0) {
                            log(`偵測到 data 為陣列，路徑: json.data[0].eta_res`);
                            rawList = json.data[0].eta_res || [];
                        } else if (json.data && json.data.eta_res) {
                            log(`偵測到 data 為物件，路徑: json.data.eta_res`);
                            rawList = json.data.eta_res;
                        } else {
                            log(`無法識別的數據結構: ${Object.keys(json.data || {}).join(', ')}`, 'ERROR');
                        }
                        
                        etas = rawList.map(d => ({ dest: '高山道', time: d.timestamp, is_sch: d.eta_status === 0 })).slice(0, 3);
                        log(`${item.route} 解析成功，獲得 ${etas.length} 班數據`);
                    }
                }

                // 構建簡單 UI 以確認佈局
                html += `<div class="card">
                    <div><b>${item.route}</b><br><small>${item.type}</small></div>
                    <div class="eta-section">${etas.map(e => `<div class="eta-box">${Math.floor((new Date(e.time) - new Date())/60000)}</div>`).join('')}</div>
                </div>`;

            } catch (e) { 
                log(`${item.route} 徹底失敗！原因: ${e.message}`, 'ERROR');
                log(`Stack Trace: ${e.stack}`, 'ERROR');
            }
        }
        display.innerHTML = html;
        log("--- 本次刷新週期結束 ---");
    }

    updateUI();
    setInterval(updateUI, 30000);
</script>
</body>
</html>
